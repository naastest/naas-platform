# ArgoCD cluster secret for the DEV cluster.
# For local Minikube: server = https://kubernetes.default.svc (in-cluster)
# For a real dev cluster: replace server and add bearerToken + tlsClientConfig.
#
# This file stores the SECRET REFERENCE — the actual credentials are Sealed Secrets.
# Run: kubeseal --fetch-cert | kubeseal --format yaml > clusters/secrets/cluster-dev-sealed.yaml
apiVersion: v1
kind: Secret
metadata:
  name: cluster-dev
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    naas.io/managed: "true"
    naas.io/env: dev
type: Opaque
stringData:
  name: dev
  # For minikube (in-cluster), use the in-cluster URL:
  server: https://kubernetes.default.svc
  config: |
    {
      "tlsClientConfig": {
        "insecure": false
      }
    }
