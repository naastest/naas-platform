# ArgoCD cluster secret for the TEST cluster.
# Replace server URL and seal the credentials before committing.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-test
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    naas.io/managed: "true"
    naas.io/env: test
type: Opaque
stringData:
  name: test
  server: https://test-cluster.example.com   # TODO: replace with real cluster URL
  config: |
    {
      "bearerToken": "REPLACE_WITH_SEALED_SECRET",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "REPLACE_WITH_BASE64_CA"
      }
    }
