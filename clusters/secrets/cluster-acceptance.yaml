# ArgoCD cluster secret for the ACCEPTANCE cluster.
apiVersion: v1
kind: Secret
metadata:
  name: cluster-acceptance
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    naas.io/managed: "true"
    naas.io/env: acceptance
type: Opaque
stringData:
  name: acceptance
  server: https://acceptance-cluster.example.com   # TODO: replace with real cluster URL
  config: |
    {
      "bearerToken": "REPLACE_WITH_SEALED_SECRET",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "REPLACE_WITH_BASE64_CA"
      }
    }
