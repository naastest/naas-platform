apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: namespace-viewer
  labels:
    naas.io/managed-by: naas-platform
rules:
  - apiGroups: ["", "apps", "batch", "autoscaling", "networking.k8s.io", "policy"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Viewers cannot see secret values
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: []
