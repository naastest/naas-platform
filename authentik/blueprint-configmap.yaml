# Delivers NaaS Authentik blueprints as a ConfigMap mounted into the
# Authentik server pod at /blueprints/custom/. Authentik discovers and
# applies any YAML file placed there automatically.
#
# Managed by ArgoCD via platform/applicationsets/platform-components.yaml.
# Adding a new blueprint = add an entry here + ArgoCD syncs it + Authentik picks it up.
apiVersion: v1
kind: ConfigMap
metadata:
  name: naas-authentik-blueprints
  namespace: authentik
  labels:
    naas.io/managed-by: argocd
data:
  kubernetes-provider.yaml: |
    version: 1
    metadata:
      name: naas-kubernetes-provider
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Kubernetes NaaS
        attrs:
          name: Kubernetes NaaS
          client_id: kubernetes
          client_type: public
          redirect_uris:
            - url: "http://localhost:8000"
              matching_mode: strict
            - url: "http://localhost:18000"
              matching_mode: strict
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        state: present
        identifiers:
          slug: kubernetes
        attrs:
          name: Kubernetes
          slug: kubernetes
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Kubernetes NaaS]]

  argocd-provider.yaml: |
    version: 1
    metadata:
      name: naas-argocd-provider
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: ArgoCD
        attrs:
          name: ArgoCD
          client_id: argocd
          client_type: confidential
          redirect_uris:
            - url: "https://argocd.naas.local/auth/callback"
              matching_mode: strict
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        state: present
        identifiers:
          slug: argocd
        attrs:
          name: ArgoCD
          slug: argocd
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, ArgoCD]]

  gangplank-provider.yaml: |
    version: 1
    metadata:
      name: naas-gangplank-provider
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: Gangplank
        attrs:
          name: Gangplank
          client_id: gangplank
          client_type: confidential
          client_secret: "gangplank-naas-local-2026"
          redirect_uris:
            - url: "https://gangplank.naas.local/callback"
              matching_mode: strict
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      - model: authentik_core.application
        state: present
        identifiers:
          slug: gangplank
        attrs:
          name: Gangplank
          slug: gangplank
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Gangplank]]

  platform-groups.yaml: |
    version: 1
    metadata:
      name: naas-platform-groups
    entries:
      - model: authentik_core.group
        state: present
        identifiers:
          name: naas-platform-admin
        attrs:
          name: naas-platform-admin
          is_superuser: false
          attributes:
            naas_role: platform-admin
      - model: authentik_core.group
        state: present
        identifiers:
          name: naas-payments-admin
        attrs:
          name: naas-payments-admin
          is_superuser: false
          attributes:
            naas_team: payments
            naas_role: admin
      - model: authentik_core.group
        state: present
        identifiers:
          name: naas-payments-dev
        attrs:
          name: naas-payments-dev
          is_superuser: false
          attributes:
            naas_team: payments
            naas_role: developer
      - model: authentik_core.group
        state: present
        identifiers:
          name: naas-payments-viewer
        attrs:
          name: naas-payments-viewer
          is_superuser: false
          attributes:
            naas_team: payments
            naas_role: viewer
      - model: authentik_core.group
        state: present
        identifiers:
          name: naas-frontend-admin
        attrs:
          name: naas-frontend-admin
          is_superuser: false
          attributes:
            naas_team: frontend
            naas_role: admin
      - model: authentik_core.group
        state: present
        identifiers:
          name: naas-frontend-dev
        attrs:
          name: naas-frontend-dev
          is_superuser: false
          attributes:
            naas_team: frontend
            naas_role: developer
      - model: authentik_core.group
        state: present
        identifiers:
          name: naas-frontend-viewer
        attrs:
          name: naas-frontend-viewer
          is_superuser: false
          attributes:
            naas_team: frontend
            naas_role: viewer
