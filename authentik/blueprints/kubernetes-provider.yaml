# Authentik Blueprint: Kubernetes OIDC provider (for kubectl oidc-login)
version: 1
metadata:
  name: naas-kubernetes-provider
entries:
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: Kubernetes NaaS
    attrs:
      name: Kubernetes NaaS
      client_id: kubernetes
      client_type: public        # public client for kubectl oidc-login
      redirect_uris: |
        http://localhost:8000
        http://localhost:18000
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]

  - model: authentik_core.application
    state: present
    identifiers:
      slug: kubernetes
    attrs:
      name: Kubernetes
      slug: kubernetes
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, Kubernetes NaaS]]
