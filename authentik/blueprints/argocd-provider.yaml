# Authentik Blueprint: ArgoCD OIDC provider
# Apply via: Authentik UI → System → Blueprints → Upload, or mount as a ConfigMap.
# See: https://docs.goauthentik.io/docs/customize/blueprints/
version: 1
metadata:
  name: naas-argocd-provider
entries:
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: ArgoCD
    attrs:
      name: ArgoCD
      client_id: argocd
      client_type: confidential
      # client_secret: set via Authentik UI or Sealed Secret
      redirect_uris: |
        https://argocd.naas.local/auth/callback
        https://argocd.staging.example.com/auth/callback
        https://argocd.production.example.com/auth/callback
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]

  - model: authentik_core.application
    state: present
    identifiers:
      slug: argocd
    attrs:
      name: ArgoCD
      slug: argocd
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, ArgoCD]]
