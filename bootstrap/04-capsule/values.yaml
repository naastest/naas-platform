manager:
  options:
    # Groups recognized as Capsule users — capsule-proxy filters namespace lists for these groups.
    # Add all three role groups for every tenant team here.
    # (New team onboarding: append naas-{team}-admin, naas-{team}-dev, naas-{team}-viewer)
    capsuleUserGroups:
      - naas-platform-admin
      - naas-payments-admin
      - naas-payments-dev
      - naas-payments-viewer
      - naas-frontend-admin
      - naas-frontend-dev
      - naas-frontend-viewer
    enableTLSReconciler: true
