manager:
  options:
    # Users/Groups recognized as Capsule users — capsule-proxy filters namespace lists for these.
    # In v0.12+ the old capsuleUserGroups list became a structured users list.
    # (New team onboarding: append a Group entry for naas-{team}-admin/dev/viewer)
    users:
      - kind: Group
        name: naas-platform-admin
      - kind: Group
        name: naas-payments-admin
      - kind: Group
        name: naas-payments-dev
      - kind: Group
        name: naas-payments-viewer
      - kind: Group
        name: naas-frontend-admin
      - kind: Group
        name: naas-frontend-dev
      - kind: Group
        name: naas-frontend-viewer
