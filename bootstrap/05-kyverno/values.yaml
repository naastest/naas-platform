# Disable post-upgrade cleanup hooks — they use hook-delete-policy: hook-succeeded
# which deletes the Job before ArgoCD records completion, causing a permanent
# "waiting for hook" stuck state on every Kyverno upgrade.
# Stale PolicyReports and webhook configs are harmless in local dev.
policyReportsCleanup:
  enabled: false
webhooksCleanup:
  enabled: false

admissionController:
  replicas: 1   # single-replica for local dev
backgroundController:
  replicas: 1
cleanupController:
  replicas: 1
reportsController:
  replicas: 1
config:
  webhooks:
    namespaceSelector:
      matchExpressions:
        # Exclude system namespaces from Kyverno admission (prevents chicken-and-egg on bootstrap)
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            - argocd
            - kyverno
            - cert-manager
            - ingress-nginx
            - authentik
            - capsule-system
