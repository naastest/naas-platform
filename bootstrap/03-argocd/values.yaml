global:
  domain: argocd.naas.local

configs:
  cm:
    url: http://argocd.naas.local
    application.resourceTrackingMethod: annotation
    oidc.config: |
      name: Authentik
      issuer: http://authentik.naas.local/application/o/argocd/
      clientID: argocd
      clientSecret: $argocd-authentik-secret:oidc.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
        - groups
      groupsClaim: groups
  rbac:
    policy.default: role:readonly
    scopes: "[groups, email]"
    policy.csv: |
      # Platform team has full admin access
      g, naas-platform-admin, role:admin

      # Per-team roles — add a line pair for each team that is onboarded.
      # Pattern: g, naas-{team}-admin, role:{team}-admin
      #          g, naas-{team}-dev,   role:{team}-dev

      # Payments team
      g, naas-payments-admin, role:payments-admin
      g, naas-payments-dev,   role:payments-dev

      p, role:payments-admin, applications, *,      payments/*, allow
      p, role:payments-admin, applicationsets, get, payments/*, allow
      p, role:payments-dev,   applications, get,    payments/*, allow
      p, role:payments-dev,   applications, sync,   payments/*, allow
      p, role:payments-dev,   applications, override, payments/*, allow
  params:
    server.insecure: true
  secret:
    argocdServerAdminPassword: ""

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.naas.local
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    tls: false

repoServer:
  env:
    - name: ARGOCD_EXEC_TIMEOUT
      value: "5m"

applicationSet:
  enabled: true

notifications:
  enabled: true

  cm:
    create: true

  secret:
    create: false   # apply argocd-notifications-secret manually (see docs/local-dev.md)

  notifiers:
    # service.github only supports GitHub App auth (appID + privateKey) — no PAT support.
    # Use webhook services instead so we can authenticate with a PAT token.
    service.webhook.github-status: |
      url: https://api.github.com
      headers:
        - name: Authorization
          value: "token $github-token"
        - name: Content-Type
          value: application/json
    service.webhook.github-comment: |
      url: https://api.github.com
      headers:
        - name: Authorization
          value: "token $github-token"
        - name: Content-Type
          value: application/json
        - name: Accept
          value: application/vnd.github.v3+json

  triggers:
    trigger.on-preview-deployed: |
      - when: >-
          app.status.health.status == 'Healthy' &&
          app.status.sync.status == 'Synced' &&
          'preview.naas.io/pr-number' in app.metadata.annotations
        oncePer: "{{index .app.status.sync.revisions 1}}"
        send: [preview-deployed]
    trigger.on-preview-degraded: |
      - when: >-
          app.status.health.status == 'Degraded' &&
          'preview.naas.io/pr-number' in app.metadata.annotations
        oncePer: "{{index .app.status.sync.revisions 1}}"
        send: [preview-degraded]
    trigger.on-preview-sync-failed: |
      - when: >-
          app.status.operationState != nil &&
          app.status.operationState.phase == 'Failed' &&
          'preview.naas.io/pr-number' in app.metadata.annotations
        oncePer: app.status.operationState.startedAt
        send: [preview-sync-failed]

  templates:
    template.preview-deployed: |
      webhook:
        github-status:
          method: POST
          path: /repos/{{index .app.metadata.annotations "preview.naas.io/repo"}}/statuses/{{index .app.status.sync.revisions 1}}
          body: |
            {"state": "success", "context": "continuous-deployment/preview", "description": "Preview deployed", "target_url": "http://argocd.naas.local/applications/argocd/{{.app.metadata.name}}"}
        github-comment:
          method: POST
          path: /repos/{{index .app.metadata.annotations "preview.naas.io/repo"}}/issues/{{index .app.metadata.annotations "preview.naas.io/pr-number"}}/comments
          body: |
            {"body": "## 🚀 Preview environment ready\n\n| | |\n|---|---|\n| **App** | `{{.app.metadata.name}}` |\n| **Namespace** | `{{.app.spec.destination.namespace}}` |\n| **Sync** | {{.app.status.sync.status}} |\n| **Health** | {{.app.status.health.status}} |\n| **ArgoCD** | [Open →](http://argocd.naas.local/applications/argocd/{{.app.metadata.name}}) |{{if .app.status.summary.externalURLs}}\n\n**URLs:**\n{{range .app.status.summary.externalURLs}}- {{.}}\n{{end}}{{end}}"}
    template.preview-degraded: |
      webhook:
        github-status:
          method: POST
          path: /repos/{{index .app.metadata.annotations "preview.naas.io/repo"}}/statuses/{{index .app.status.sync.revisions 1}}
          body: |
            {"state": "failure", "context": "continuous-deployment/preview", "description": "Preview degraded", "target_url": "http://argocd.naas.local/applications/argocd/{{.app.metadata.name}}"}
        github-comment:
          method: POST
          path: /repos/{{index .app.metadata.annotations "preview.naas.io/repo"}}/issues/{{index .app.metadata.annotations "preview.naas.io/pr-number"}}/comments
          body: |
            {"body": "## ⚠️ Preview environment degraded\n\n| | |\n|---|---|\n| **App** | `{{.app.metadata.name}}` |\n| **Namespace** | `{{.app.spec.destination.namespace}}` |\n| **Health** | {{.app.status.health.status}} |\n| **ArgoCD** | [Open →](http://argocd.naas.local/applications/argocd/{{.app.metadata.name}}) |"}
    template.preview-sync-failed: |
      webhook:
        github-status:
          method: POST
          path: /repos/{{index .app.metadata.annotations "preview.naas.io/repo"}}/statuses/{{index .app.status.sync.revisions 1}}
          body: |
            {"state": "failure", "context": "continuous-deployment/preview", "description": "Preview sync failed", "target_url": "http://argocd.naas.local/applications/argocd/{{.app.metadata.name}}"}
        github-comment:
          method: POST
          path: /repos/{{index .app.metadata.annotations "preview.naas.io/repo"}}/issues/{{index .app.metadata.annotations "preview.naas.io/pr-number"}}/comments
          body: |
            {"body": "## ❌ Preview sync failed\n\n| | |\n|---|---|\n| **App** | `{{.app.metadata.name}}` |\n| **Namespace** | `{{.app.spec.destination.namespace}}` |\n| **ArgoCD** | [Open →](http://argocd.naas.local/applications/argocd/{{.app.metadata.name}}) |"}
