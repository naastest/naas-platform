global:
  domain: argocd.naas.local

configs:
  cm:
    url: http://argocd.naas.local
    application.resourceTrackingMethod: annotation
    oidc.config: |
      name: Authentik
      issuer: http://authentik.naas.local/application/o/argocd/
      clientID: argocd
      clientSecret: $argocd-authentik-secret:oidc.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
        - groups
      groupsClaim: groups
  rbac:
    policy.default: role:readonly
    scopes: "[groups, email]"
    policy.csv: |
      # Platform team has full admin access
      g, naas-platform-admin, role:admin

      # Per-team roles — add a line pair for each team that is onboarded.
      # Pattern: g, naas-{team}-admin, role:{team}-admin
      #          g, naas-{team}-dev,   role:{team}-dev

      # Payments team
      g, naas-payments-admin, role:payments-admin
      g, naas-payments-dev,   role:payments-dev

      p, role:payments-admin, applications, *,      payments/*, allow
      p, role:payments-admin, applicationsets, get, payments/*, allow
      p, role:payments-dev,   applications, get,    payments/*, allow
      p, role:payments-dev,   applications, sync,   payments/*, allow
      p, role:payments-dev,   applications, override, payments/*, allow
  params:
    server.insecure: true
  secret:
    argocdServerAdminPassword: ""

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.naas.local
    annotations:
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    tls: false

repoServer:
  env:
    - name: ARGOCD_EXEC_TIMEOUT
      value: "5m"

applicationSet:
  enabled: true

notifications:
  enabled: false
