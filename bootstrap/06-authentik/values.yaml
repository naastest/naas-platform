authentik:
  # Bootstrap credentials (change after first login)
  # In production: set these via Sealed Secrets, not plaintext
  secret_key: "change-me-in-production-sealed-secret"
  bootstrap:
    email: "admin@naas.local"
    password: "change-me-on-first-login"
    token: ""
  postgresql:
    password: "authentik-pg-local"

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - authentik.naas.local
    tls:
      - secretName: authentik-tls
        hosts:
          - authentik.naas.local
  volumes:
    - name: naas-blueprints
      configMap:
        name: naas-authentik-blueprints
  volumeMounts:
    - name: naas-blueprints
      mountPath: /blueprints/custom

worker:
  volumes:
    - name: naas-blueprints
      configMap:
        name: naas-authentik-blueprints
  volumeMounts:
    - name: naas-blueprints
      mountPath: /blueprints/custom

postgresql:
  enabled: true   # bundled postgres for local dev; use external in production
  auth:
    password: "authentik-pg-local"
    database: authentik
    usePasswordFiles: false   # avoid POSTGRES_PASSWORD_FILE conflict with old field managers

redis:
  enabled: true   # bundled redis for local dev; use external in production
