apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: capsule-proxy-gangplank
  namespace: capsule-system
  labels:
    app.kubernetes.io/name: capsule-proxy
    app.kubernetes.io/component: gangplank
    naas.io/managed-by: argocd
  annotations:
    cert-manager.io/cluster-issuer: naas-ca
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: gangplank.naas.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: capsule-proxy-gangplank
                port:
                  number: 80
  tls:
    - secretName: gangplank-naas-local-tls
      hosts:
        - gangplank.naas.local
