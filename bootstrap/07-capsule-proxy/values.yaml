options:
  # Use the same username claim as the kube-apiserver
  oidcUsernameClaim: preferred_username
  # Bearer token from the Gangplank id_token is forwarded to the kube-apiserver.
  # kube-apiserver validates it via OIDC (issuer=https://authentik.naas.local/,
  # client-id=gangplank). The Gangplank Authentik provider must have issuer_mode=global.
  authPreferredTypes: "BearerToken"
  # TLS is handled by ingress-nginx; capsule-proxy listens plain HTTP internally
  enableSSL: false
  # Index namespaces by RoleBinding membership instead of Capsule Tenant status.
  # Required because namespaces are created by ArgoCD (not through Capsule's admission
  # webhook), so Capsule's status.namespaces stays at 0. The RoleBinding reflector
  # indexes each namespace where Kyverno has generated a naas-{admin,developer,viewer}
  # RoleBinding for the team group — and returns only those namespaces for the user.
  roleBindingReflector: true
  # Platform admins bypass capsule-proxy filtering entirely — their requests go
  # straight to the kube-apiserver where the cluster-admin ClusterRoleBinding applies.
  ignoredUserGroups:
    - naas-platform-admin

gangplank:
  enabled: true

  # No secret reference for session key — set via envs for local dev.
  # Production: use a SealedSecret and reference it here.
  sensitiveEnvs: {}

  envs:
    GANGPLANK_CONFIG_SESSION_SECURITY_KEY: "naas-local-gangplank-session-key-32c"

  config:
    clusterName: "naas-local"

    # User's browser is redirected here to authenticate
    # Authentik 2026.x: authorize/token are at /application/o/{endpoint}/ (no slug prefix)
    # The client_id param identifies which provider to use
    authorizeURL: "https://authentik.naas.local/application/o/authorize/"
    # Gangplank server calls this directly (same URL — CA cert is mounted)
    tokenURL: "https://authentik.naas.local/application/o/token/"

    redirectURL: "https://gangplank.naas.local/callback"

    clientID: "gangplank"
    clientSecret: "gangplank-naas-local-2026"

    # Request groups so they appear in the generated kubeconfig exec credential
    scopes:
      - openid
      - profile
      - email
      - groups
      - offline_access

    # Map the preferred_username claim — matches kube-apiserver oidc-username-claim
    usernameClaim: "preferred_username"

    # Generated kubeconfig points to capsule-proxy so namespace filtering applies
    apiServerURL: "https://capsule-proxy.naas.local"

    # capsule-proxy is behind the naas-local cert-manager CA
    clusterCAPath: "/cacerts/ca.crt"

    # Trust naas-local CA for token URL HTTPS calls to Authentik
    trustedCAPath: "/cacerts/ca.crt"

  # Mount the naas-local CA cert so Gangplank can validate Authentik's TLS
  volumes:
    - name: cacerts
      configMap:
        name: naas-local-ca
  volumeMounts:
    - name: cacerts
      mountPath: /cacerts
      readOnly: true

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: naas-ca
    hosts:
      - host: gangplank.naas.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: gangplank-naas-local-tls
        hosts:
          - gangplank.naas.local

# capsule-proxy needs to reach the real kube-apiserver
# In minikube this is the in-cluster service
replicaCount: 1

service:
  type: ClusterIP
  port: 9001

ingress:
  enabled: true
  className: nginx
  annotations:
    # Pass the OIDC bearer token through without stripping it
    nginx.ingress.kubernetes.io/auth-tls-pass-certificate-to-upstream: "false"
    # Proxy websockets (needed for kubectl exec/logs)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: capsule-proxy.naas.local
      paths: ["/"]
  tls:
    - secretName: capsule-proxy-naas-local-tls
      hosts:
        - capsule-proxy.naas.local
