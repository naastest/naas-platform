    - name: generate-quota-acceptance
      match:
        any:
          - resources:
              kinds: [Namespace]
              selector:
                matchLabels:
                  naas.io/env: acceptance
      generate:
        apiVersion: v1
        kind: ResourceQuota
        name: naas-quota
        namespace: "{{request.object.metadata.name}}"
        synchronize: true
        data:
          metadata:
            labels:
              naas.io/managed-by: kyverno
              naas.io/cost-center: "{{request.object.metadata.labels['naas.io/cost-center']}}"
          spec:
            hard:
              requests.cpu: "16"
              requests.memory: 32Gi
              limits.cpu: "32"
              limits.memory: 64Gi
              pods: "100"
              services: "40"
              persistentvolumeclaims: "15"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-resource-quota-production
  annotations:
    policies.kyverno.io/title: Generate ResourceQuota (production)
    policies.kyverno.io/category: NaaS Generate
spec:
