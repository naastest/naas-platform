# Platform team — tier: large
# Aggregate tenant quota: 20 namespaces / 200 CPU req / 400 Gi mem req
---
apiVersion: capsule.clastix.io/v1beta2
kind: Tenant
metadata:
  name: platform
  labels:
    naas.io/team: platform
    naas.io/tenant-tier: large
spec:
  owners:
    - kind: Group
      name: naas-platform-admin
      clusterRoles: ["admin", "capsule-namespace-deleter"]

  # ── Tenant aggregate quota (large tier) ──────────────────────────────────
  resourceQuotas:
    scope: Tenant
    items:
      - hard:
          count/namespaces: "20"
          requests.cpu: "200"
          limits.cpu: "400"
          requests.memory: 400Gi
          limits.memory: 800Gi
          persistentvolumeclaims: "100"

  additionalRoleBindings:
    - clusterRoleName: admin
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: naas-platform-admin
    - clusterRoleName: edit
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: naas-platform-dev
    - clusterRoleName: view
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: naas-platform-viewer

  networkPolicies:
    items:
      - podSelector: {}
        policyTypes: [Ingress, Egress]
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    naas.io/team: platform
        egress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    naas.io/team: platform
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
            ports:
              - port: 53
                protocol: UDP
              - port: 53
                protocol: TCP
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  labels:
    naas.io/team: platform
    naas.io/managed-by: naas-platform
spec:
  description: "NaaS AppProject for the platform team (tier: large)"

  sourceRepos:
    - "https://github.com/naastest/team-platform"
    - "https://github.com/naastest/naas-platform"
    - "https://charts.bitnami.com/bitnami"
    - "https://charts.helm.sh/stable"
    - "https://charts.jetstack.io"
    - "https://bitnami-labs.github.io/sealed-secrets"
    - "https://kubernetes.github.io/ingress-nginx"
    - "https://projectcapsule.github.io/charts"
    - "https://kyverno.github.io/kyverno/"
    - "https://charts.goauthentik.io"
    - "https://argoproj.github.io/argo-helm"

  destinations:
    - name: dev
      namespace: "platform-*"
    - name: test
      namespace: "platform-*"
    - name: acceptance
      namespace: "platform-*"
    - name: production
      namespace: "platform-*"
    # Platform components (ArgoCD, Kyverno, Capsule, Authentik, etc.) deploy
    # into their own system namespaces. Use server URL (not cluster name) to
    # avoid name-resolution ambiguity in AppProject destination matching.
    - server: "https://kubernetes.default.svc"
      namespace: "argocd"
    - server: "https://kubernetes.default.svc"
      namespace: "kyverno"
    - server: "https://kubernetes.default.svc"
      namespace: "capsule-system"
    - server: "https://kubernetes.default.svc"
      namespace: "authentik"
    - server: "https://kubernetes.default.svc"
      namespace: "ingress-nginx"
    - server: "https://kubernetes.default.svc"
      namespace: "cert-manager"
    - server: "https://kubernetes.default.svc"
      namespace: "kube-system"

  # Platform project manages infrastructure operators (CRDs, webhooks, RBAC, etc.)
  # so it needs broad permissions. The strict allow-lists belong on team projects.
  # The blacklist below preserves Kyverno's exclusive control over quota/limitrange.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceBlacklist:
    - group: ""
      kind: "ResourceQuota"
    - group: ""
      kind: "LimitRange"

  roles:
    - name: admin
      policies:
        - "p, proj:platform:admin, applications, *, platform/*, allow"
      groups:
        - "naas-platform-admin"
    - name: developer
      policies:
        - "p, proj:platform:developer, applications, get, platform/*, allow"
        - "p, proj:platform:developer, applications, sync, platform/*, allow"
        - "p, proj:platform:developer, applications, override, platform/*, allow"
      groups:
        - "naas-platform-dev"
