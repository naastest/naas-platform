# ============================================================
# Capsule Tenant + ArgoCD AppProject Template
# ============================================================
# Copy to tenants/{team-name}.yaml and fill in:
#   1. TEAM_NAME     → team slug (lowercase, e.g. "payments")
#   2. Tenant tier   → uncomment one quota block below (default: medium)
#
# Both quota levels apply simultaneously:
#   • Per-namespace quota  → generated by Kyverno from naas.io/env label
#   • Tenant aggregate     → this file; caps the team's TOTAL across all namespaces
#
# See tenants/tiers.yaml for tier rationale.
# ============================================================
---
apiVersion: capsule.clastix.io/v1beta2
kind: Tenant
metadata:
  name: TEAM_NAME
  labels:
    naas.io/team: TEAM_NAME
    naas.io/tenant-tier: medium    # small | medium | large | xlarge
spec:
  owners:
    - kind: Group
      name: naas-TEAM_NAME-admin    # Authentik group for tenant owners

  # Auto-assign namespaces bearing this label to the tenant
  namespaceSelectorLabels:
    naas.io/team: TEAM_NAME

  # ── Tenant aggregate quota ────────────────────────────────────────────────
  # Enforced by Capsule across ALL namespaces this team owns, combined.
  # Kyverno's per-namespace quotas (from naas.io/env) also apply — both limits
  # are active; whichever is more restrictive wins.
  #
  # Uncomment exactly ONE tier block:

  # --- small: up to 5 NS / 50 CPU req / 100 Gi mem req ----
  # resourceQuotas:
  #   scope: Tenant
  #   items:
  #     - hard:
  #         count/namespaces: "5"
  #         requests.cpu: "50"
  #         limits.cpu: "100"
  #         requests.memory: 100Gi
  #         limits.memory: 200Gi
  #         persistentvolumeclaims: "20"

  # --- medium (default): up to 10 NS / 100 CPU req / 200 Gi mem req ---
  resourceQuotas:
    scope: Tenant
    items:
      - hard:
          count/namespaces: "10"
          requests.cpu: "100"
          limits.cpu: "200"
          requests.memory: 200Gi
          limits.memory: 400Gi
          persistentvolumeclaims: "50"

  # --- large: up to 20 NS / 200 CPU req / 400 Gi mem req ---
  # resourceQuotas:
  #   scope: Tenant
  #   items:
  #     - hard:
  #         count/namespaces: "20"
  #         requests.cpu: "200"
  #         limits.cpu: "400"
  #         requests.memory: 400Gi
  #         limits.memory: 800Gi
  #         persistentvolumeclaims: "100"

  # --- xlarge: up to 40 NS / 400 CPU req / 800 Gi mem req ---
  # resourceQuotas:
  #   scope: Tenant
  #   items:
  #     - hard:
  #         count/namespaces: "40"
  #         requests.cpu: "400"
  #         limits.cpu: "800"
  #         requests.memory: 800Gi
  #         limits.memory: 1600Gi
  #         persistentvolumeclaims: "200"

  # ── Roles granted to team groups in every namespace they own ──────────────
  additionalRoleBindings:
    - clusterRoleName: admin
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: naas-TEAM_NAME-admin
    - clusterRoleName: edit
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: naas-TEAM_NAME-dev
    - clusterRoleName: view
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: naas-TEAM_NAME-viewer

  # ── Default NetworkPolicies (Kyverno adds per-compliance extras) ──────────
  networkPolicies:
    items:
      - podSelector: {}
        policyTypes: [Ingress, Egress]
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    naas.io/team: TEAM_NAME
        egress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    naas.io/team: TEAM_NAME
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
            ports:
              - port: 53
                protocol: UDP
              - port: 53
                protocol: TCP
---
# ── ArgoCD AppProject ─────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: TEAM_NAME
  namespace: argocd
  labels:
    naas.io/team: TEAM_NAME
    naas.io/managed-by: naas-platform
spec:
  description: "NaaS AppProject for team TEAM_NAME"

  sourceRepos:
    - "https://github.com/naastest/team-TEAM_NAME"
    - "https://charts.bitnami.com/bitnami"
    - "https://charts.helm.sh/stable"

  destinations:
    - name: dev
      namespace: "TEAM_NAME-*"
    - name: test
      namespace: "TEAM_NAME-*"
    - name: acceptance
      namespace: "TEAM_NAME-*"
    - name: production
      namespace: "TEAM_NAME-*"

  clusterResourceWhitelist: []

  namespaceResourceWhitelist:
    - group: "apps"
      kind: "*"
    - group: "batch"
      kind: "*"
    - group: ""
      kind: "Service"
    - group: ""
      kind: "ConfigMap"
    - group: ""
      kind: "Secret"
    - group: ""
      kind: "ServiceAccount"
    - group: "networking.k8s.io"
      kind: "Ingress"
    - group: "autoscaling"
      kind: "*"
    - group: "policy"
      kind: "PodDisruptionBudget"

  namespaceResourceBlacklist:
    - group: "rbac.authorization.k8s.io"
      kind: "*"
    - group: "networking.k8s.io"
      kind: "NetworkPolicy"
    - group: ""
      kind: "ResourceQuota"
    - group: ""
      kind: "LimitRange"
    - group: "kyverno.io"
      kind: "*"
    - group: "capsule.clastix.io"
      kind: "*"

  roles:
    - name: admin
      policies:
        - "p, proj:TEAM_NAME:admin, applications, *, TEAM_NAME/*, allow"
      groups:
        - "naas-TEAM_NAME-admin"
    - name: developer
      policies:
        - "p, proj:TEAM_NAME:developer, applications, get, TEAM_NAME/*, allow"
        - "p, proj:TEAM_NAME:developer, applications, sync, TEAM_NAME/*, allow"
        - "p, proj:TEAM_NAME:developer, applications, override, TEAM_NAME/*, allow"
      groups:
        - "naas-TEAM_NAME-dev"
    - name: viewer
      policies:
        - "p, proj:TEAM_NAME:viewer, applications, get, TEAM_NAME/*, allow"
      groups:
        - "naas-TEAM_NAME-viewer"

  syncWindows:
    - kind: allow
      schedule: "0 6 * * 1-5"
      duration: 16h
      applications:
        - "*-production"
      clusters:
        - production
      manualSync: true
