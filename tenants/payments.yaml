# Payments team — tier: medium
# Aggregate tenant quota: 10 namespaces / 100 CPU req / 200 Gi mem req
#
# Per-namespace quotas (Kyverno, both apply simultaneously):
#   dev        →  4 CPU req /  8 Gi mem req
#   test       →  8 CPU req / 16 Gi mem req
#   acceptance → 16 CPU req / 32 Gi mem req
#   production → 32 CPU req / 64 Gi mem req
#
# Example: 2×dev + 1×test + 1×acceptance + 1×production
#   = 2×4 + 8 + 16 + 32 = 68 CPU requests — within the 100 CPU tenant ceiling.
---
apiVersion: capsule.clastix.io/v1beta2
kind: Tenant
metadata:
  name: payments
  labels:
    naas.io/team: payments
    naas.io/tenant-tier: medium
spec:
  owners:
    # All three groups are listed as owners so capsule-proxy can filter
    # namespace listings to only show payments-* namespaces to team members.
    # The clusterRoles here determine what owners can do at tenant scope;
    # fine-grained namespace access is controlled by Kyverno-generated RoleBindings.
    - kind: Group
      name: naas-payments-admin
      clusterRoles: ["admin", "capsule-namespace-deleter"]
    - kind: Group
      name: naas-payments-dev
      clusterRoles: ["edit"]
    - kind: Group
      name: naas-payments-viewer
      clusterRoles: ["view"]

  # ── Tenant aggregate quota (medium tier) ─────────────────────────────────
  resourceQuotas:
    scope: Tenant
    items:
      - hard:
          count/namespaces: "10"
          requests.cpu: "100"
          limits.cpu: "200"
          requests.memory: 200Gi
          limits.memory: 400Gi
          persistentvolumeclaims: "50"

  additionalRoleBindings:
    - clusterRoleName: admin
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: naas-payments-admin
    - clusterRoleName: edit
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: naas-payments-dev
    - clusterRoleName: view
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: naas-payments-viewer

  networkPolicies:
    items:
      - podSelector: {}
        policyTypes: [Ingress, Egress]
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    naas.io/team: payments
        egress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    naas.io/team: payments
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
            ports:
              - port: 53
                protocol: UDP
              - port: 53
                protocol: TCP
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: payments
  namespace: argocd
  labels:
    naas.io/team: payments
    naas.io/managed-by: naas-platform
spec:
  description: "NaaS AppProject for team payments (tier: medium)"

  sourceRepos:
    - "https://github.com/naastest/team-payments"
    - "https://charts.bitnami.com/bitnami"
    - "https://charts.helm.sh/stable"

  destinations:
    - name: dev
      namespace: "payments-*"
    - name: test
      namespace: "payments-*"
    - name: acceptance
      namespace: "payments-*"
    - name: production
      namespace: "payments-*"

  clusterResourceWhitelist: []

  namespaceResourceWhitelist:
    - group: "apps"
      kind: "*"
    - group: "batch"
      kind: "*"
    - group: ""
      kind: "Service"
    - group: ""
      kind: "ConfigMap"
    - group: ""
      kind: "Secret"
    - group: ""
      kind: "ServiceAccount"
    - group: "networking.k8s.io"
      kind: "Ingress"
    - group: "autoscaling"
      kind: "*"
    - group: "policy"
      kind: "PodDisruptionBudget"

  namespaceResourceBlacklist:
    - group: "rbac.authorization.k8s.io"
      kind: "*"
    - group: "networking.k8s.io"
      kind: "NetworkPolicy"
    - group: ""
      kind: "ResourceQuota"
    - group: ""
      kind: "LimitRange"
    - group: "kyverno.io"
      kind: "*"
    - group: "capsule.clastix.io"
      kind: "*"

  roles:
    - name: admin
      policies:
        - "p, proj:payments:admin, applications, *, payments/*, allow"
      groups:
        - "naas-payments-admin"
    - name: developer
      policies:
        - "p, proj:payments:developer, applications, get, payments/*, allow"
        - "p, proj:payments:developer, applications, sync, payments/*, allow"
        - "p, proj:payments:developer, applications, override, payments/*, allow"
      groups:
        - "naas-payments-dev"
    - name: viewer
      policies:
        - "p, proj:payments:viewer, applications, get, payments/*, allow"
      groups:
        - "naas-payments-viewer"

  syncWindows:
    - kind: allow
      schedule: "0 6 * * 1-5"
      duration: 16h
      applications:
        - "*-production"
      clusters:
        - production
      manualSync: true
