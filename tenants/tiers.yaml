# ============================================================
# Tenant Quota Tiers — reference document
# ============================================================
# When onboarding a new team, the platform team selects one tier
# and copies its values into the team's tenant file.
#
# How it works:
#   Capsule enforces TWO levels of quota simultaneously:
#   1. Per-namespace quota  — generated by Kyverno from naas.io/env label
#                             (e.g. production = 32 CPU / 64Gi)
#   2. Tenant aggregate quota — enforced by Capsule across ALL team namespaces combined
#                               A team with tier=medium can never exceed 100 CPU total,
#                               regardless of how many namespaces they create.
#
# Both limits apply. The more restrictive one wins at any given time.
#
# Choosing a tier:
#   small  — new/small teams, few services, mostly dev workloads
#   medium — typical product team (default)
#   large  — multiple squads, data-heavy or high-traffic services
#   xlarge — platform team or business-critical large-scale services
# ============================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: naas-tenant-tiers
  namespace: capsule-system
  labels:
    naas.io/managed-by: naas-platform
data:
  # ── small ────────────────────────────────────────────────────────────────
  # Namespaces : up to 5
  # CPU        : 50 cores total (requests), 100 cores (limits)
  # Memory     : 100 Gi total (requests), 200 Gi (limits)
  # Storage    : 20 PVCs
  small: |
    count/namespaces: "5"
    requests.cpu: "50"
    limits.cpu: "100"
    requests.memory: 100Gi
    limits.memory: 200Gi
    persistentvolumeclaims: "20"

  # ── medium (default) ─────────────────────────────────────────────────────
  # Namespaces : up to 10
  # CPU        : 100 cores total (requests), 200 cores (limits)
  # Memory     : 200 Gi total (requests), 400 Gi (limits)
  # Storage    : 50 PVCs
  medium: |
    count/namespaces: "10"
    requests.cpu: "100"
    limits.cpu: "200"
    requests.memory: 200Gi
    limits.memory: 400Gi
    persistentvolumeclaims: "50"

  # ── large ────────────────────────────────────────────────────────────────
  # Namespaces : up to 20
  # CPU        : 200 cores total (requests), 400 cores (limits)
  # Memory     : 400 Gi total (requests), 800 Gi (limits)
  # Storage    : 100 PVCs
  large: |
    count/namespaces: "20"
    requests.cpu: "200"
    limits.cpu: "400"
    requests.memory: 400Gi
    limits.memory: 800Gi
    persistentvolumeclaims: "100"

  # ── xlarge ───────────────────────────────────────────────────────────────
  # Namespaces : up to 40
  # CPU        : 400 cores total (requests), 800 cores (limits)
  # Memory     : 800 Gi total (requests), 1600 Gi (limits)
  # Storage    : 200 PVCs
  xlarge: |
    count/namespaces: "40"
    requests.cpu: "400"
    limits.cpu: "800"
    requests.memory: 800Gi
    limits.memory: 1600Gi
    persistentvolumeclaims: "200"
