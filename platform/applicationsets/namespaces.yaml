# Four ApplicationSets — one per DTAP cluster.
# Each set watches its env-specific namespace directory.
# Namespace directory layout: namespaces/{env}/{team}-{tier}/namespace.yaml
#
# Each ArgoCD cluster secret must be named after its env (dev/test/acceptance/production)
# and carry the label naas.io/managed=true.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-namespaces-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/naastest/naas-platform.git
        revision: HEAD
        directories:
          - path: "namespaces/dev/*"
          - path: "namespaces/dev/_template"
            exclude: true
  template:
    metadata:
      name: "ns-{{.path.basename}}"
      labels:
        naas.io/managed-by: namespace-applicationset
        naas.io/env: dev
    spec:
      project: platform
      source:
        repoURL: https://github.com/naastest/naas-platform.git
        targetRevision: HEAD
        path: "{{.path.path}}"
      destination:
        name: dev   # ArgoCD cluster secret name = env name
        namespace: "{{.path.basename}}-dev"
      syncPolicy:
        automated:
          prune: false   # safe default — enable after deletion workflow is in place
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
