# Four ApplicationSets — one per DTAP cluster.
#
# Each set uses the GitHub SCM provider generator to auto-discover all repos
# in the naastest org matching the pattern "team-*". It then watches the
# namespaces/{env}/ directory in each team repo.
#
# Teams own their namespace definitions in their own repos (shift-left).
# Kyverno + Capsule enforce guardrails automatically on the cluster side.
#
# pathsExist filter: repos without a namespaces/{env}/ directory are silently
# skipped — no Application is created until the directory exists.
#
# Prerequisites:
# - A GitHub token stored in Secret argocd-scm-token (key: token) in the argocd namespace.
#   The token needs org:read + repo:read scope to discover repos.
#   Create as a Sealed Secret: kubectl create secret generic argocd-scm-token \
#     --from-literal=token=<ghp_...> -n argocd --dry-run=client -o yaml | kubeseal > ...
# - Each DTAP cluster registered as an ArgoCD cluster secret named dev/test/acceptance/production.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-namespaces-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - scmProvider:
        github:
          organization: naastest
          tokenRef:
            secretName: argocd-scm-token
            key: token
        filters:
          - repositoryMatch: "^team-"
            branchMatch: "^main$"
            pathsExist: ["namespaces/dev"]
        cloneProtocol: https
  template:
    metadata:
      name: "ns-{{.repository}}-dev"
      labels:
        naas.io/managed-by: namespace-applicationset
        naas.io/env: dev
    spec:
      project: default
      source:
        repoURL: "{{.url}}"
        targetRevision: "{{.branch}}"
        path: namespaces/dev
      destination:
        name: dev
        namespace: argocd
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
