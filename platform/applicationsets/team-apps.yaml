# Deploys team workloads from each team repo's apps/{env}/ directory.
# Each team-* repo owns its own app manifests; this ApplicationSet fans them
# out to the correct DTAP cluster. Teams use their AppProject to restrict
# which namespaces and resources they can touch.
#
# Directory layout expected in each team repo:
#   apps/dev/          → deployed to dev cluster
#   apps/test/         → deployed to test cluster
#   apps/acceptance/   → deployed to acceptance cluster
#   apps/production/   → deployed to production cluster
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-apps-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - scmProvider:
        github:
          organization: naastest
          tokenRef:
            secretName: argocd-scm-token
            key: token
        filters:
          - repositoryMatch: "^team-"
            branchMatch: "^main$"
        cloneProtocol: https
  template:
    metadata:
      name: "apps-{{.repository}}-dev"
      labels:
        naas.io/managed-by: apps-applicationset
        naas.io/env: dev
    spec:
      project: default
      source:
        repoURL: "{{.url}}"
        targetRevision: "{{.branch}}"
        path: apps/dev
        directory:
          recurse: false
      destination:
        name: dev
        namespace: argocd   # default; resources carry their own namespace
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
