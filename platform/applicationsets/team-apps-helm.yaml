# Helm-based team workloads — alternative to raw-manifest apps/dev/.
#
# Teams put per-service values files under apps/helm/{env}/ in their team repo.
# Each file is a standard Helm values file for the naastest/helm-charts `service`
# chart. The ApplicationSet reads the files via the Git generator and creates one
# Helm Application per file per environment.
#
# File layout expected in each team repo:
#   apps/helm/dev/*.yaml          → deployed to dev cluster
#   apps/helm/test/*.yaml         → deployed to test cluster
#   apps/helm/acceptance/*.yaml   → deployed to acceptance cluster
#   apps/helm/production/*.yaml   → deployed to production cluster
#
# Required keys in each values file:
#   image          full image:tag string
#   containerPort  port the container listens on
#   namespace      target Kubernetes namespace  (must match {team}-*)
#   resources      requests + limits (required by Kyverno)
#
# The release name (and all Kubernetes resource names) is derived from the
# values file stem: apps/helm/dev/checkout-service.yaml → "checkout-service".
#
# Multi-source design: the chart comes from naastest/helm-charts (git path),
# and the values file comes directly from the team repo. This avoids the
# valuesObject interpolation problem (nested YAML structures from the git
# file generator render as Go map strings, not proper YAML).
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-apps-helm-dev
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - scmProvider:
              github:
                organization: naastest
                tokenRef:
                  secretName: argocd-scm-token
                  key: token
              filters:
                - repositoryMatch: "^team-"
                  branchMatch: "^main$"
                  pathsExist: ["apps/helm/dev"]
              cloneProtocol: https
          - git:
              repoURL: "{{.url}}"
              revision: "{{.branch}}"
              files:
                - path: "apps/helm/dev/*.yaml"
  template:
    metadata:
      name: "helm-{{trimPrefix `team-` .repository}}-{{.path.filename | trimSuffix `.yaml`}}-dev"
      labels:
        naas.io/managed-by: helm-applicationset
        naas.io/env: dev
    spec:
      project: '{{trimPrefix "team-" .repository}}'
      sources:
        - repoURL: "https://github.com/naastest/helm-charts"
          path: charts/service
          targetRevision: HEAD
          helm:
            releaseName: '{{.path.filename | trimSuffix ".yaml"}}'
            valueFiles:
              - "$values/{{.path.path}}/{{.path.filename}}"
        - repoURL: "{{.url}}"
          targetRevision: "{{.branch}}"
          ref: values
      destination:
        name: dev
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
