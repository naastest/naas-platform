# Manages platform components that ArgoCD controls after bootstrap:
# Kyverno policies, ArgoCD config, RBAC, Authentik blueprints, Capsule tenants.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-components
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - component: kyverno-policies
            path: policies
          - component: argocd-config
            path: platform/argocd-config
          - component: rbac
            path: rbac
          - component: authentik-config
            path: authentik
          - component: tenants
            path: tenants
  template:
    metadata:
      name: "platform-{{.component}}"
      labels:
        naas.io/managed-by: platform-applicationset
    spec:
      project: platform
      source:
        repoURL: https://github.com/naastest/naas-platform.git
        targetRevision: HEAD
        path: "{{.path}}"
        directory:
          recurse: true
      destination:
        name: dev         # use cluster name, not server URL — avoids ambiguity when multiple clusters share kubernetes.default.svc
        namespace: argocd
      ignoreDifferences:
        # Kyverno's defaulting webhook adds these fields after every apply.
        # Ignoring them prevents permanent OutOfSync on all ClusterPolicies.
        - group: kyverno.io
          kind: ClusterPolicy
          jqPathExpressions:
            - .spec.admission
            - .spec.emitWarning
            - .spec.rules[].skipBackgroundRequests
            - ".spec.rules[].validate.allowExistingViolations"
            - ".spec.rules[].mutate.allowExistingViolations"
            - ".spec.rules[].generate.allowExistingViolations"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
