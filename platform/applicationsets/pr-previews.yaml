# PR Preview environments — one Helm Application per service per open PR.
#
# Source repos (e.g. naastest/neon-billboard) drive previews via their CI:
#   1. Dev opens PR on neon-billboard
#   2. neon-billboard CI builds the image, tags it :<sha>, pushes to GHCR
#   3. CI opens a draft PR on team-payments (branch preview/neon-billboard-pr-<N>)
#      containing apps/helm/dev/neon-billboard.yaml with image:<sha>, ingress host,
#      env vars — a complete values file for this exact commit
#   4. ArgoCD polls GitHub every 2 min via the pullRequest generator here
#   5. For each apps/helm/dev/*.yaml on the PR branch, creates one Application:
#        preview-payments-pr-<N>-neon-billboard
#   6. Deploys to namespace payments-preview-pr-<N> with ingress:
#        neon-billboard-pr-<source-PR>.preview.naas.local
#   7. Push to the source PR → CI updates the branch → ArgoCD re-syncs to new SHA
#   8. Source PR closed → CI deletes the branch → ArgoCD prunes Application + namespace
#
# The values file is the single source of truth — no valuesObject overrides here.
# This keeps the ApplicationSet generic and lets each source repo control its own values.
#
# To add a new team: copy this block, change pullRequest.github.repo and project/team labels.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pr-preview-team-payments
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - pullRequest:
              github:
                owner: naastest
                repo: team-payments
                tokenRef:
                  secretName: argocd-scm-token
                  key: token
              requeueAfterSeconds: 120
          - git:
              repoURL: "https://github.com/naastest/team-payments"
              revision: "{{.head_sha}}"
              files:
                - path: "apps/helm/dev/*.yaml"
  template:
    metadata:
      name: 'preview-payments-pr-{{.number}}-{{.path.filename | trimSuffix ".yaml"}}'
      labels:
        naas.io/managed-by: pr-preview
        naas.io/team: payments
        naas.io/env: dev
      annotations:
        # Branch is preview/neon-billboard-pr-<N> — extract the source PR number.
        preview.naas.io/pr-number: '{{.branch | trimPrefix "preview/neon-billboard-pr-"}}'
        preview.naas.io/repo: "naastest/neon-billboard"
        notifications.argoproj.io/subscribe.on-preview-deployed.github-status: ""
        notifications.argoproj.io/subscribe.on-preview-deployed.github-comment: ""
        notifications.argoproj.io/subscribe.on-preview-degraded.github-status: ""
        notifications.argoproj.io/subscribe.on-preview-degraded.github-comment: ""
        notifications.argoproj.io/subscribe.on-preview-sync-failed.github-status: ""
        notifications.argoproj.io/subscribe.on-preview-sync-failed.github-comment: ""
    spec:
      project: payments
      sources:
        - repoURL: "https://github.com/naastest/helm-charts"
          path: charts/service
          targetRevision: HEAD
          helm:
            releaseName: '{{.path.filename | trimSuffix ".yaml"}}'
            valueFiles:
              - "$values/{{.path.path}}/{{.path.filename}}"
            # No valuesObject overrides — image, env, and ingress are written into
            # the values file by the source repo's CI, so every field reflects
            # the exact commit SHA and source PR number.
        - repoURL: "https://github.com/naastest/team-payments"
          targetRevision: "{{.head_sha}}"
          ref: values
      destination:
        name: dev
        namespace: "payments-preview-pr-{{.number}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        managedNamespaceMetadata:
          labels:
            naas.io/team: payments
            naas.io/env: dev
            naas.io/tier: backend
            naas.io/app: "pr-{{.number}}"
            naas.io/cost-center: payments-preview
            naas.io/compliance: standard
            naas.io/preview: "true"
