# PR Preview environments — one Helm Application per service per open PR.
#
# Developers add or modify values files under apps/helm/dev/ in their PR branch.
# ArgoCD detects the PR, reads every apps/helm/dev/*.yaml file from the PR's HEAD,
# and creates one Application per file using the same service Helm chart as dev/prod.
# Each Application gets an ingress injected automatically so the URL appears in the
# PR status comment.
#
# Flow:
#   1. Dev opens PR on team-payments (e.g. PR #42)
#   2. ArgoCD polls GitHub every 2 min via the pullRequest generator
#   3. For each apps/helm/dev/*.yaml on the PR branch, creates one Application:
#        preview-payments-pr-42-checkout-service
#        preview-payments-pr-42-payment-api
#   4. Each deploys to namespace payments-preview-pr-42 with its own ingress:
#        checkout-service-pr-42.preview.naas.local
#        payment-api-pr-42.preview.naas.local
#   5. ArgoCD posts a PR comment with the ingress URLs
#   6. PR merged → Applications deleted → namespace pruned
#
# To add a new team: copy this block, change the pullRequest.github.repo and update
# the project/team labels. One ApplicationSet per team repo is required.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: pr-preview-team-payments
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - pullRequest:
              github:
                owner: naastest
                repo: team-payments
                tokenRef:
                  secretName: argocd-scm-token
                  key: token
              requeueAfterSeconds: 120
          - git:
              repoURL: "https://github.com/naastest/team-payments"
              revision: "{{.head_sha}}"
              files:
                - path: "apps/helm/dev/*.yaml"
  template:
    metadata:
      name: 'preview-payments-pr-{{.number}}-{{.path.filename | trimSuffix ".yaml"}}'
      labels:
        naas.io/managed-by: pr-preview
        naas.io/team: payments
        naas.io/env: dev
      annotations:
        preview.naas.io/pr-number: "{{.number}}"
        preview.naas.io/repo: "naastest/team-payments"
        notifications.argoproj.io/subscribe.on-preview-deployed.github-status: ""
        notifications.argoproj.io/subscribe.on-preview-deployed.github-comment: ""
        notifications.argoproj.io/subscribe.on-preview-degraded.github-status: ""
        notifications.argoproj.io/subscribe.on-preview-degraded.github-comment: ""
        notifications.argoproj.io/subscribe.on-preview-sync-failed.github-status: ""
        notifications.argoproj.io/subscribe.on-preview-sync-failed.github-comment: ""
    spec:
      project: payments
      sources:
        - repoURL: "https://github.com/naastest/helm-charts"
          path: charts/service
          targetRevision: HEAD
          helm:
            releaseName: '{{.path.filename | trimSuffix ".yaml"}}'
            valueFiles:
              - "$values/{{.path.path}}/{{.path.filename}}"
            valuesObject:
              image: 'ghcr.io/naastest/neon-billboard:{{.head_sha}}'
              ingress:
                enabled: true
                host: '{{.path.filename | trimSuffix ".yaml"}}-pr-{{.number}}.preview.naas.local'
              env:
                APP_ENV: preview
                PR_NUMBER: '{{.number}}'
                GIT_BRANCH: '{{.branch}}'
                GIT_COMMIT: '{{.head_sha}}'
        - repoURL: "https://github.com/naastest/team-payments"
          targetRevision: "{{.head_sha}}"
          ref: values
      destination:
        name: dev
        namespace: "payments-preview-pr-{{.number}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        managedNamespaceMetadata:
          labels:
            naas.io/team: payments
            naas.io/env: dev
            naas.io/tier: backend
            naas.io/app: "pr-{{.number}}"
            naas.io/cost-center: payments-preview
            naas.io/compliance: standard
            naas.io/preview: "true"
