# Generates one ArgoCD Application per Capsule Tenant file.
# Each Application syncs only that team's tenant YAML (Tenant CR + AppProject).
# Generator reads tenants/*.yaml to extract team name from metadata.name.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: team-appprojects
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/naastest/naas-platform.git
        revision: HEAD
        files:
          - path: "tenants/[!_]*.yaml"   # excludes _template.yaml
  template:
    metadata:
      name: "appproject-{{.metadata.name}}"
      labels:
        naas.io/managed-by: appprojects-applicationset
    spec:
      project: default
      source:
        repoURL: https://github.com/naastest/naas-platform.git
        targetRevision: HEAD
        path: tenants
        directory:
          include: "{{base .path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
